{% extends "base.html" %}
{% block title %}Leave a Review — GhanaServe{% endblock %}
{% block content %}
<h1>Review your experience</h1>
<p>Pro: {{ booking.quote.pro.business_name or booking.quote.pro.user.full_name }}</p>
<form method="POST" action="{{ url_for('customer.leave_review', booking_id=booking.id) }}">
  <p><label>Rating (1–5)<br>
    <select name="rating" required>
      <option value="5">5 — Excellent</option>
      <option value="4">4 — Good</option>
      <option value="3">3 — Average</option>
      <option value="2">2 — Poor</option>
      <option value="1">1 — Very poor</option>
    </select>
  </label></p>
  <p><label>Comment<br><textarea name="comment" rows="3"></textarea></label></p>
  <p><button type="submit">Submit review</button></p>
</form>
{% endblock %}
