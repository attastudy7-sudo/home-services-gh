{% extends "base.html" %}
{% block title %}Pay — GhanaServe{% endblock %}
{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
{% endblock %}
{% block content %}
<div class="gd-page">
  <div class="gd-page-header">
    <div>
      <div class="gd-page-title">Pay for booking</div>
      <div class="gd-page-sub">{{ booking.quote.request.title }}</div>
    </div>
    <a href="{{ url_for('customer.view_booking', booking_id=booking.id) }}" class="gd-link">&larr; Back</a>
  </div>
  <div class="gd-card">
    <div class="gd-card-header">
      Amount due
      <span style="font-size:1.5rem;font-weight:700;color:#1A7A4A;">GH&#8373; {{ booking.agreed_price }}</span>
    </div>
    <form method="POST" action="{{ url_for('customer.initiate_payment', booking_id=booking.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="gd-form-group">
        <label class="gd-label">Payment method</label>
        <select class="gd-select" name="gateway" id="gateway_select" onchange="toggleMomo()">
          <option value="cash">Cash on completion</option>
          <option value="paystack">Paystack (Mobile Money / Card)</option>
        </select>
      </div>
      <div id="momo_fields" style="display:none;">
        <div class="gd-form-group">
          <label class="gd-label">Mobile Money network</label>
          <select class="gd-select" name="momo_network">
            <option value="mtn">MTN</option>
            <option value="telecel">Telecel</option>
            <option value="at">AT</option>
          </select>
        </div>
        <div class="gd-form-group">
          <label class="gd-label">Mobile Money number</label>
          <input class="gd-input" type="text" name="momo_number" placeholder="+233XXXXXXXXX">
        </div>
      </div>
      <div class="gd-actions">
        <button type="submit" class="gd-btn">Pay now</button>
      </div>
    </form>
  </div>
</div>
<script>
function toggleMomo() {
  const sel = document.getElementById('gateway_select');
  document.getElementById('momo_fields').style.display = sel.value === 'paystack' ? 'block' : 'none';
}
</script>
{% endblock %}
