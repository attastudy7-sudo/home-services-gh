{% extends "base.html" %}
{% block title %}Pay — GhanaServe{% endblock %}
{% block content %}
<h1>Pay for booking</h1>
<p>Booking: <strong>{{ booking.quote.request.title }}</strong></p>
<p>Amount: <strong>GH&#8373; {{ booking.agreed_price }}</strong></p>
<form method="POST" action="{{ url_for('customer.initiate_payment', booking_id=booking.id) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <p><label>Payment method:
    <select name="gateway" id="gateway_select" onchange="toggleMomo()">
      <option value="cash">Cash on completion</option>
      <option value="paystack">Paystack (Mobile Money / Card)</option>
    </select>
  </label></p>
  <div id="momo_fields" class="d-none">
    <p><label>Mobile Money network:
      <select name="momo_network">
        <option value="mtn">MTN</option>
        <option value="telecel">Telecel</option>
        <option value="at">AT</option>
      </select>
    </label></p>
    <p><label>Mobile Money number<br><input type="text" name="momo_number" placeholder="+233XXXXXXXXX"></label></p>
  </div>
  <p><button type="submit">Pay now</button></p>
</form>
<script>
function toggleMomo() {
  const sel = document.getElementById('gateway_select');
  document.getElementById('momo_fields').style.display = sel.value === 'paystack' ? 'block' : 'none';
}
</script>
{% endblock %}
