{% extends "base.html" %}
{% block title %}Forgot Password — GhanaServe{% endblock %}
{% block content %}
<h1>Reset your password</h1>
<form method="POST" action="{{ url_for('auth.forgot_password') }}">
  <p><label>Email address<br><input type="email" name="email" required></label></p>
  <p><button type="submit">Send reset link</button></p>
</form>
{% endblock %}
